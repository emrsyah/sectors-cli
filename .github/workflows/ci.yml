name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go' | grep -v '\.gen\.go$'))
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -count=1

  generated-fresh:
    # Fails if the committed generated client is stale vs the spec + fixspec.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go generate ./...
      - name: verify no drift
        run: |
          if ! git diff --exit-code -- internal/sectors/sectors.gen.go; then
            echo "::error::internal/sectors/sectors.gen.go is stale — run 'go generate ./...' and commit."
            exit 1
          fi
